<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Real-Time Vehicle Tracking System</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 250px;
    background: #2c3e50;
    color: white;
    padding: 20px;
}

.sidebar h2 {
    text-align: center;
}

.vehicle {
    background: #34495e;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
}

/* Main Content */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Navbar */
.navbar {
    background: #1abc9c;
    color: white;
    padding: 15px;
    font-size: 20px;
}

/* Map */
#map {
    flex: 1;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>🚗 Vehicles</h2>

    <div class="vehicle">
        <strong>Vehicle 1</strong><br>
        Speed: <span id="speed1">0</span> km/h<br>
        Status: Active
    </div>

    <div class="vehicle">
        <strong>Vehicle 2</strong><br>
        Speed: <span id="speed2">0</span> km/h<br>
        Status: Active
    </div>
</div>

<div class="main">
    <div class="navbar">
        Real-Time Vehicle Tracking Dashboard
    </div>
    <div id="map"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// Initialize map
var map = L.map('map').setView([20.5937, 78.9629], 5);

// Map tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// Vehicle markers
var vehicle1 = L.marker([20.5937, 78.9629]).addTo(map)
    .bindPopup("Vehicle 1");

var vehicle2 = L.marker([19.0760, 72.8777]).addTo(map)
    .bindPopup("Vehicle 2");

// Simulate movement
setInterval(function() {

    // Random movement for Vehicle 1
    var lat1 = vehicle1.getLatLng().lat + (Math.random() - 0.5) * 0.5;
    var lng1 = vehicle1.getLatLng().lng + (Math.random() - 0.5) * 0.5;
    vehicle1.setLatLng([lat1, lng1]);

    var speed1 = Math.floor(Math.random() * 100);
    document.getElementById("speed1").innerText = speed1;

    // Random movement for Vehicle 2
    var lat2 = vehicle2.getLatLng().lat + (Math.random() - 0.5) * 0.5;
    var lng2 = vehicle2.getLatLng().lng + (Math.random() - 0.5) * 0.5;
    vehicle2.setLatLng([lat2, lng2]);

    var speed2 = Math.floor(Math.random() * 100);
    document.getElementById("speed2").innerText = speed2;

}, 3000);

</script>

</body>
</html>
